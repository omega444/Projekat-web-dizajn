<!DOCTYPE html>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-light static-top">
            <div class="container">
                <a class="navbar-brand" href="#">
                    <img class="img-responsive pull-right" src="images/logo.png" alt="logo" />

                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarResponsive"

                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarResponsive">

                    <ul class="navbar-nav ml-auto">

                    </ul>
                </div>
            </div>
        </nav>

    <main>
        <div class="container">
            <h1 class="text-center">Izbor knjiga</h1>
            <div class="card mb-3">
                <div class="row no-gutters">
                    <div class="col-md-4">
                        <a href="#"><img class="card-img" src="https://i.imgur.com/kTquRc0.jpg" alt="naslovnaStranica"></a>
                    </div>
                    <div class="col-md-8">
                        <div class="card-body">
                            <h2 class="card-title"><a href="#">Na Drini ćuprija</a></h2>
                            <h3 class="card-text">Ivo Andrić</h3>
                            <div class="rating">
                                <a href="#"><img src="images/prazna zvezda.png" alt="prazna zvezda"></a>
                                <a href="#"><img src="images/prazna zvezda.png" alt="prazna zvezda"></a>
                                <a href="#"><img src="images/prazna zvezda.png" alt="prazna zvezda"></a>
                                <a href="#"><img src="images/prazna zvezda.png" alt="prazna zvezda"></a>
                                <a href="#"><img src="images/prazna zvezda.png" alt="prazna zvezda"></a>
                            </div>
                            <p class="ocena">5/5</p>
                            <p class="cena">935RSD</p>
                            <button type="button" class="btn btn-primary">Dodaj u korpu</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card mb-3">
                <div class="row no-gutters">
                    <div class="col-md-4">
                        <a href="#"><img class="card-img" src="images/stock.jpg" alt="naslovnaStranica"></a>                    </div>
                    <div class="col-md-8">
                        <div class="card-body">
                            <h2 class="card-title"><a href="#" id="bookName">Naslov knjige</a></h2>
                            <h3 class="card-text">Autor</h3>
                            <div class="rating">
                                <a href="#"><img src="images/prazna zvezda.png" alt="prazna zvezda"></a>
                                <a href="#"><img src="images/prazna zvezda.png" alt="prazna zvezda"></a>
                                <a href="#"><img src="images/prazna zvezda.png" alt="prazna zvezda"></a>

                            </div>
                            <p class="ocena">3/5</p>
                            <p class="cena">9999RSD</p>
                            <button type="button" class="btn btn-primary">Dodaj u korpu</button>
                        </div>
                    </div>
                </div>
            </div>
