<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knjizara - Korpa</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="images/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
    <header>

    </header>

    <main>
        <div class="pb-5">
            <div class="container">
                <div class="row">
                    <div class="col-lg-12 p-5 bg-white rounded shadow-sm mb-5">
                        <div class="table-responsive">
                            <table class="table bg-light">
                                <thead>
                                    <tr>
                                        <th scope="col" class="border-0">
                                            <div class="p-2 px-3 text-uppercase">Knjiga</div>
                                        </th>
                                        <th scope="col" class="border-0">
                                            <div class="py-2 text-uppercase text-center">Cena</div>
                                        </th>
                                        <th scope="col" class="border-0">
                                            <div class="py-2 text-uppercase text-center">Komada</div>
                                        </th>
                                        <th scope="col" class="border-0">
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <th scope="row" class="border-0">
                                            <div class="p-2">
                                                <img src="https://i.imgur.com/kTquRc0.jpg"
                                                    alt="Naslovna stranica knjige" width="70"
                                                    class="img-fluid rounded shadow-sm">
                                                <div class="ml-3 d-inline-block align-middle">
                                                    <h5 class="mb-0"> <a href="#"
                                                            class="text-dark d-inline-block align-middle">Na
                                                            Drini Cuprija</a></h5><span
                                                        class="text-muted font-weight-normal d-block">Ivo Andric</span>
                                                </div>
                                            </div>
                                        </th>
                                        <td class="border-0 align-middle text-center"><strong>950,00 RSD</strong></td>
                                        <td class="border-0 align-middle text-center"><input class="quantity" min="1"
                                                name="quantity" value="1" type="number"></td>
                                        <td class="border-0 align-middle text-center"><button
                                                class="btn btn-danger btn-sm rounded-0" type="submit"
                                                data-placement="top" title="Obrisi"><i class="fa fa-trash"></i></button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <th scope="row" class="border-0">
                                            <div class="p-2">
                                                <img src="https://i.imgur.com/LfrIt2t.jpeg"
                                                    alt="Naslovna stranica knjige" width="70"
                                                    class="img-fluid rounded shadow-sm">
                                                <div class="ml-3 d-inline-block align-middle">
                                                    <h5 class="mb-0"> <a href="#"
                                                            class="text-dark d-inline-block align-middle">Moby Dick</a>
                                                    </h5><span class="text-muted font-weight-normal d-block">Herman
                                                        Melville</span>
                                                </div>
                                            </div>
                                        </th>
                                        <td class="border-0 align-middle text-center"><strong>470,00 RSD</strong></td>
                                        <td class="border-0 align-middle text-center"><input class="quantity" min="1"
                                                name="quantity" value="1" type="number"></td>
                                        <td class="border-0 align-middle text-center"><button
                                                class="btn btn-danger btn-sm rounded-0" type="submit"
                                                data-placement="top" title="Obrisi"><i class="fa fa-trash"></i></button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                            <p class="text-right"><b>0000 RSD</b></p>
                            <button type="submit" class="btn btn-success pull-right">Kupi</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="page-footer font-small pt-4">

    </footer>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"
        integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.min.js"
        integrity="sha384-w1Q4orYjBQndcko6MimVbzY0tgp4pWB4lZ7lr30WKz0vr/aWKhXdBNmNb5D92v7s"
        crossorigin="anonymous"></script>
    <script src="js/skript.js"></script>
    <script src="js/validateFields.js"></script>
    <script src="js/addHeaderFooter.js"></script>
</body>

</html>
