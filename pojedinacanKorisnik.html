<!DOCTYPE html>
<html lang="rs">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knjizara - Korisnik</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="images/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-light bg-light static-top">
            <div class="container">
                <a class="navbar-brand" href="index.html">
                    <img class="img-responsive pull-right" src="images/logo.png" alt="logo" />
                </a>
                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarResponsive"
                    aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarResponsive">

                    <ul class="navbar-nav ml-auto">
                        <li class="nav-item active"><a class="nav-link" href="index.html">Pocetna<span
                                    class="sr-only">(current)</span></a></li>
                        <li class="nav-item active"><a class="nav-link" href="#">Upravljanje korisnicima</a></li>
                        <li class="nav-item active"><a class="nav-link" href="#" data-toggle="modal"
                                data-target="#Modal">Prijava</a></li>
                        <li class="nav-item active"><a class="nav-link" href="#" data-toggle="modal"
                                data-target="#Registracija">Registracija</a></li>
                        <li class="nav-item active"><a class="nav-link" href="korpa.html">Korpa</a></li>
                    </ul>
                </div>
            </div>
            <div class="modal fade" id="Modal" tabindex="-1" aria-labelledby="ModalLabel" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" id="ModalLabel">Prijavite se</h5>
                            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                <span aria-hidden="true">&times;</span>
                            </button>
                        </div>
                        <div class="modal-body">
                            <form>
                                <div class="form-group">
                                    <label for="InputEmail">E-mail adresa</label>
                                    <input type="email" class="form-control" id="InputEmail"
                                        aria-describedby="emailHelp">
                                </div>
                                <div class="form-group">
                                    <label for="InputPassword">Sifra</label>
                                    <input type="password" class="form-control" id="InputPassword">
                                </div>
                                <button type="submit" class="btn btn-primary">Prijavi se</button>
                                <button type="button" class="btn btn-secondary" data-dismiss="modal">Zatvori</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal fade" id="Registracija" tabindex="-1" aria-labelledby="ModalLabel" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" id="ModalLabel">Registrujte se</h5>
                            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                <span aria-hidden="true">&times;</span>
                            </button>
                        </div>
                        <div class="modal-body">
                            <form>
                                <div class="form-group">
                                    <label for="InputKorisnickoIme">Korisnicko ime</label>
                                    <input type="text" class="form-control" id="InputKorisnickoIme" required>
                                </div>
                                <div class="form-group">
                                    <label for="InputPassword">Sifra</label>
                                    <input type="password" class="form-control" id="InputPassword" required>
                                </div>
                                <div class="form-group">
                                    <label for="InputEmail">E-mail adresa</label>
                                    <input type="email" class="form-control" id="InputEmail"
                                        aria-describedby="emailHelp" required>
                                </div>
                                <div class="form-group">
                                    <label for="InputIme">Ime</label>
                                    <input type="text" class="form-control" id="InputIme" required>
                                </div>
                                <div class="form-group">
                                    <label for="InputPrezime">Prezime</label>
                                    <input type="text" class="form-control" id="InputPrezime" required>
                                </div>
                                <div class="form-group">
                                    <label for="InputDatumRodjenja">Datum rodjenja</label>
                                    <input type="date" id="InputDatumRodjenja" class="form-control datepicker" required>
                                </div>
                                <div class="form-group">
                                    <label for="InputAdresa">Adresa</label>
                                    <input placeholder="Ulica broj, Grad" type="text" class="form-control"
                                        id="InputAdresa" required>
                                </div>
                                <div class="form-group">
                                    <label for="InputTelefon">Broj telefona</label>
                                    <input placeholder="+3810000000000" type="tel" class="form-control"
                                        id="InputTelefon" required>
                                </div>
                                <button type="submit" class="btn btn-primary">Prijavi se</button>
                                <button type="button" class="btn btn-secondary" data-dismiss="modal">Zatvori</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container">
            <div class="card mb-3">
                <div class="row no-gutters">
                    <div class="col-md-12">
                        <a href="izmenaDetaljaoKorisniku.html"><button type="button"
                                class="btn btn-info float-right mt-4 mr-4">Izmeni</button></a>
                        <div class="card-body">
                            <h1 class="card-title text-center">Detalji korisnika</h1>
                            <h3 class="card-text">Ime</h3>
                            <h3 class="card-text">Prezime</h3>
                            <p class="card-text">Datum rodjenja</p>
                            <p class="card-text">Adresa</p>
                            <p class="card-text">Korisnicko ime</p>
                            <p class="card-text">Email</p>                            
                            <p class="card-text">Broj telefona</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="page-footer font-small pt-4">
        <div class="footer-copyright text-center py-3">&copy; 2020 Copyright:
            <a href="#"> Nenad Dinic</a>
        </div>
    </footer>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"
        integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.min.js"
        integrity="sha384-w1Q4orYjBQndcko6MimVbzY0tgp4pWB4lZ7lr30WKz0vr/aWKhXdBNmNb5D92v7s"
        crossorigin="anonymous"></script>
    <script src="js/skript.js"></script>
</body>

</html>
